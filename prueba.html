<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación MODO DIOS</title>

<style>
body {margin:0;background:black;color:white;font-family:sans-serif;overflow:hidden}
.screen{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:1s}
.hidden{opacity:0;transform:scale(2);pointer-events:none}
.card{width:90%;max-width:360px;padding:25px;border-radius:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);text-align:center;animation:zoom 1s}
@keyframes zoom{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}

h1{font-size:1.8rem}

img{width:100%;border-radius:15px;margin-top:10px}

.nav{position:absolute;bottom:15px;width:100%;display:flex;justify-content:space-between;padding:0 20px}
.arrow{font-size:28px}

.flash{position:fixed;width:100%;height:100%;background:white;opacity:0;pointer-events:none}

canvas{position:fixed;top:0;left:0;z-index:-1}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="flash" id="flash"></div>

<audio id="music" autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<audio id="boom">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-explosion-impact-1684.mp3">
</audio>

<audio id="whoosh">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-whoosh-transition-1490.mp3">
</audio>

<div id="s1" class="screen">
<div class="card">
<h1>Hola...</h1>
<p>Algo grande se acerca</p>
</div>
</div>

<div id="s2" class="screen hidden">
<div class="card">
<h1>Prepárate...</h1>
<p>Esto no es una invitación normal</p>
</div>
</div>

<div id="s3" class="screen hidden">
<div class="card">
<h1>🎂 MI CUMPLEAÑOS 🎂</h1>
<p>20 Abril - 7:00PM</p>
<p>Ubicación: Mi casa</p>
<p id="count"></p>
<img src="https://picsum.photos/300/400">
<br>
<button onclick="wa()">Confirmar</button>
</div>
</div>

<div class="nav">
<div class="arrow" onclick="prev()">⬅️</div>
<div class="arrow" onclick="next()">➡️</div>
</div>

<script>
let c=1,total=3;

function flash(){
 let f=document.getElementById('flash');
 f.style.opacity=1;
 setTimeout(()=>f.style.opacity=0,200);
}

function show(n){
 document.getElementById('whoosh').play();
 flash();
 for(let i=1;i<=total;i++)document.getElementById('s'+i).classList.add('hidden');
 setTimeout(()=>{
 document.getElementById('s'+n).classList.remove('hidden');
 if(n===3) document.getElementById('boom').play();
 },200);
}

function next(){if(c<total){c++;show(c)}}
function prev(){if(c>1){c--;show(c)}}

// swipe
let x=0;
document.addEventListener('touchstart',e=>x=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
 let y=e.changedTouches[0].clientX;
 if(y<x-50)next();
 if(y>x+50)prev();
});

// contador
let d=new Date("Apr 20 2026 19:00").getTime();
setInterval(()=>{
 let n=new Date().getTime();
 let t=d-n;
 let dias=Math.floor(t/86400000);
 let h=Math.floor((t%86400000)/3600000);
 let m=Math.floor((t%3600000)/60000);
 document.getElementById('count').innerText=`${dias}d ${h}h ${m}m`;
},1000);

function wa(){window.open("https://wa.me/573000000000?text=Voy%20al%20cumple%20🔥");}

// partículas + confeti
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;canvas.height=innerHeight;
let parts=[];
for(let i=0;i<100;i++){
 parts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3,d:Math.random()*2});
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle='white';
 parts.forEach(p=>{
 ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
 p.y+=p.d;
 if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width}
 });
}
setInterval(draw,30);
</script>

</body>
</html>
